<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .container {
      padding: 16px;
      display: inline-block;
      min-width: 100px;
    }
    
    h1, h2, h3, h4, h5, h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }
    
    h1 { font-size: 2em; }
    h2 { font-size: 1.5em; }
    h3 { font-size: 1.25em; }
    h4 { font-size: 1em; }
    
    p {
      margin-bottom: 16px;
    }
    
    a {
      text-decoration: none;
    }
    
    ul, ol {
      padding-left: 2em;
      margin-bottom: 16px;
    }
    
    li {
      margin-bottom: 4px;
    }
    
    blockquote {
      padding: 0 1em;
      margin-bottom: 16px;
      border-left: 4px solid;
    }
    
    code {
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.875em;
      padding: 0.2em 0.4em;
      border-radius: 6px;
    }
    
    pre {
      padding: 16px;
      overflow-x: auto;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.875em;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    pre code {
      padding: 0;
      background: transparent;
    }
    
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 16px;
    }
    
    th, td {
      padding: 8px 12px;
      border: 1px solid;
    }
    
    th {
      font-weight: 600;
    }
    
    tr:nth-child(2n) {
      background: var(--table-stripe-bg, transparent);
    }
    
    hr {
      height: 2px;
      border: 0;
      margin: 24px 0;
    }
    
    img {
      max-width: 100%;
      height: auto;
    }
    
    .code-window {
      border-radius: 8px;
      overflow: hidden;
    }
    
    .code-window-header {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }
    
    .code-window-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .code-window-body {
      padding: 16px;
      overflow-x: auto;
    }
    
    .code-window-body pre {
      margin: 0;
      padding: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .shiki {
      padding: 16px;
      border-radius: 6px;
      white-space: pre-wrap;
      word-wrap: break-word;
      display: flex;
      flex-direction: column;
    }
    
    .shiki .line {
      min-height: 1.45em;
      display: flex;
      align-items: flex-start;
    }
    
    .line-number {
      flex-shrink: 0;
      width: 3em;
      margin-right: 1em;
      text-align: right;
      opacity: 0.5;
      user-select: none;
    }
    
    .line-content {
      flex: 1;
      min-width: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
  <style>
    {{theme_css}}
  </style>
</head>
<body class="theme-{{theme}}">
  <div class="container">
    {{content}}
  </div>
</body>
</html>
